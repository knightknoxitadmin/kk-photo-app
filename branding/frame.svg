<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <!--
    Knight Knox photo frame overlay (3:4 portrait, 1080x1440).
    Center is transparent so the photo shows through. Core Blue -> Mint rule on a
    soft scrim. Stamped logo + watermark are added by the app on top of this.
  -->
  <defs>
    <linearGradient id="kk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d33ff"/>
      <stop offset="1" stop-color="#45b6a7"/>
    </linearGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b252f" stop-opacity="0"/>
      <stop offset="1" stop-color="#1b252f" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- bottom scrim for watermark legibility -->
  <rect x="0" y="1140" width="1080" height="300" fill="url(#scrim)"/>

  <!-- clean double rule -->
  <rect x="34" y="34" width="1012" height="1372" fill="none" stroke="url(#kk)" stroke-width="6"/>
  <rect x="52" y="52" width="976" height="1336" fill="none" stroke="url(#kk)" stroke-width="2" opacity="0.7"/>

  <!-- corner ticks -->
  <g fill="url(#kk)">
    <rect x="34" y="34" width="120" height="6"/>
    <rect x="34" y="34" width="6" height="120"/>
    <rect x="926" y="34" width="120" height="6"/>
    <rect x="1040" y="34" width="6" height="120"/>
    <rect x="34" y="1400" width="120" height="6"/>
    <rect x="34" y="1286" width="6" height="120"/>
    <rect x="926" y="1400" width="120" height="6"/>
    <rect x="1040" y="1286" width="6" height="120"/>
  </g>

  <!-- thin rule above the watermark -->
  <rect x="420" y="1356" width="240" height="2" fill="url(#kk)" opacity="0.85"/>
</svg>
