<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b252f" />
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="brand-header">
      <img class="logo" id="logo" alt="" hidden />
      <div class="titles">
        <h1 id="eventTitle">Gallery</h1>
        <p class="subtitle" id="eventSubtitle"></p>
      </div>
      <div class="spacer"></div>
      <a class="pill-link" href="/">Photo Booth</a>
    </header>

    <div class="gallery-wrap">
      <p class="gallery-count" id="count">Loading photos…</p>
      <div class="grid" id="grid"></div>
      <div class="empty hidden" id="empty">No photos yet — be the first to snap one! 📸</div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="close" id="lbClose">✕</span>
    <img id="lbImg" alt="Photo" />
    <a class="download" id="lbDownload" download>⬇︎ Download</a>
  </div>

  <script src="/js/gallery.js"></script>
</body>
</html>
