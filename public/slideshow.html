<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b252f" />
  <title>Slideshow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="show" id="show">
    <img class="show-img" id="imgA" alt="" />
    <img class="show-img" id="imgB" alt="" />

    <img class="show-logo" id="logo" alt="" hidden />

    <div class="show-empty" id="empty">No photos yet — they'll appear here as guests take them 📸</div>

    <div class="show-toast" id="newToast">📸 Just added!</div>

    <div class="show-controls" id="controls">
      <button class="show-btn" id="prevBtn" title="Previous">⏮</button>
      <button class="show-btn" id="playBtn" title="Play / pause">⏸</button>
      <button class="show-btn" id="nextBtn" title="Next">⏭</button>
      <button class="show-btn" id="shuffleBtn" title="Shuffle">🔀</button>
      <button class="show-btn" id="slowBtn" title="Slower">🐢</button>
      <span class="show-count" id="count">0 / 0</span>
      <button class="show-btn" id="fastBtn" title="Faster">🐇</button>
      <button class="show-btn" id="fsBtn" title="Fullscreen">⛶</button>
      <a class="show-btn" id="boothLink" href="/" title="Booth">📷</a>
    </div>
  </div>

  <script src="/js/slideshow.js"></script>
</body>
</html>
